<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabri Chicken Fry Corner - Order Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --deep: #111814;
    --card: #181f1b;
    --orange: #f5a623;
    --orange-light: #ffc04d;
    --orange-glow: rgba(245,166,35,0.15);
    --red: #0f6b5c;
    --red-dark: #0a4d41;
    --white: #fdf6e3;
    --grey: #8a9a90;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image: 
      radial-gradient(ellipse at top, rgba(245,166,35,0.07) 0%, transparent 60%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(15,107,92,0.03) 40px,
        rgba(15,107,92,0.03) 41px
      );
  }

  /* HEADER */
  .header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    padding: 24px 16px 12px;
    border-bottom: 1px solid rgba(245,166,35,0.25);
    position: relative;
  }
  .header-flame {
    font-size: 2rem;
    animation: flicker 1.5s infinite alternate;
  }
  @keyframes flicker {
    0% { transform: scale(1) rotate(-2deg); }
    100% { transform: scale(1.1) rotate(2deg); }
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--orange);
    letter-spacing: 1px;
    line-height: 1.2;
    text-shadow: 0 0 20px rgba(245,166,35,0.5);
  }
  .header p {
    font-size: 0.7rem;
    color: var(--grey);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CHAT AREA */
  .chat-wrapper {
    width: 100%;
    max-width: 480px;
    flex: 1;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 130px);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--orange) transparent;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-start; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .bot .avatar { background: var(--orange); }
  .user .avatar { background: var(--red); }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .bot .bubble {
    background: var(--card);
    border: 1px solid rgba(245,166,35,0.15);
    border-top-left-radius: 4px;
    color: var(--white);
  }
  .user .bubble {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-top-right-radius: 4px;
    color: #fff;
  }

  /* MENU CARD */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .menu-item-btn {
    background: linear-gradient(135deg, var(--red-dark), var(--red));
    border: none;
    border-radius: 10px;
    padding: 10px 8px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    overflow: hidden;
  }
  .menu-item-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: 0.2s;
  }
  .menu-item-btn:hover::before { background: rgba(255,255,255,0.08); }
  .menu-item-btn:active { transform: scale(0.97); }
  .menu-item-btn.selected {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    box-shadow: 0 0 12px rgba(245,166,35,0.4);
  }
  .menu-item-btn .item-emoji { font-size: 1.2rem; }
  .menu-item-btn .item-name { font-weight: 600; font-size: 0.72rem; line-height: 1.2; }
  .menu-item-btn .item-qty { font-size: 0.65rem; color: rgba(255,255,255,0.75); }

  /* QTY SELECTOR */
  .qty-panel {
    background: var(--card);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 12px;
    padding: 12px;
    margin-top: 8px;
  }
  .qty-panel h4 { font-size: 0.8rem; color: var(--orange); margin-bottom: 8px; }
  .qty-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .qty-btn {
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 20px;
    color: var(--white);
    padding: 4px 12px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    transition: all 0.2s;
  }
  .qty-btn:hover, .qty-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }
  .num-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .num-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--orange);
    border: none;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', sans-serif;
    transition: 0.2s;
  }
  .num-btn:hover { background: var(--orange-light); }
  .num-display {
    font-size: 1.1rem;
    font-weight: 600;
    min-width: 24px;
    text-align: center;
  }
  .add-btn {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border: none;
    border-radius: 8px;
    padding: 8px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .add-btn:hover { opacity: 0.9; }

  /* ORDER SUMMARY */
  .order-summary {
    background: var(--card);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 12px;
    padding: 12px;
    margin-top: 6px;
  }
  .order-summary h4 { color: var(--orange); font-size: 0.8rem; margin-bottom: 8px; }
  .order-item-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .order-item-row:last-child { border-bottom: none; }
  .confirm-btn {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(135deg, #1a8a1a, #22aa22);
    border: none;
    border-radius: 8px;
    padding: 10px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .confirm-btn:hover { opacity: 0.9; }
  .cancel-btn {
    width: 100%;
    margin-top: 6px;
    background: transparent;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 8px;
    color: var(--red);
    font-family: 'Poppins', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: 0.2s;
  }
  .cancel-btn:hover { background: rgba(15,107,92,0.15); }

  /* INPUT ROW */
  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid rgba(245,166,35,0.15);
    background: var(--deep);
  }
  .chat-input {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 24px;
    padding: 10px 16px;
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: 0.2s;
  }
  .chat-input:focus { border-color: var(--orange); }
  .chat-input::placeholder { color: var(--grey); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--orange);
    border: none;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--orange-light); }

  /* OPTION BTNS */
  .option-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .opt-btn {
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.35);
    border-radius: 20px;
    color: var(--orange);
    padding: 6px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }
  .opt-btn:hover { background: var(--orange); color: #fff; }

  /* TYPING INDICATOR */
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--orange);
    border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* MORE ORDER BTN */
  .more-order-btn {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: 0.2s;
  }
  .more-order-btn:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="header">
  <div class="header-flame">🔥</div>
  <h1>Sabri Chicken Fry Corner</h1>
  <p>Tehsil School, Moradabad</p>
</div>

<div class="chat-wrapper">
  <div class="chat-area" id="chatArea"></div>
  <div class="input-row">
    <input class="chat-input" id="chatInput" type="text" placeholder="Kuch likhein ya menu se order karein..." />
    <button class="send-btn" onclick="handleUserInput()">➤</button>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  step: 'menu',        // menu | qty_select | collecting_info | confirm | done
  cart: [],
  currentItem: null,
  customerName: '',
  tableNo: '',
  pendingInfo: null
};

// ─── MENU DATA ────────────────────────────────────────────────────────────────
const menuItems = [
  { id: 1, emoji: '🍗', name: 'Chicken Fry',         type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 2, emoji: '🧈', name: 'Chicken Fry Butter',  type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 3, emoji: '🍲', name: 'Chicken Fry Tashla',  type: 'qty', options: ['Half','Full'] },
  { id: 4, emoji: '🦵', name: 'Chicken Leg Peace',   type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 5, emoji: '🍡', name: 'Chicken Lollipop',    type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 6, emoji: '🐟', name: 'Fish Fry Silan',      type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 7, emoji: '🔺', name: 'Fish Fry Singara',    type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 8, emoji: '🐠', name: 'Fish Fry Sol',        type: 'qty', options: ['Qtr','Half','Full'] },
  { id: 9, emoji: '🫓', name: 'Roti',                type: 'num', min: 1, max: 10 },
  { id:10, emoji: '🥤', name: 'Colddrink',           type: 'num', min: 1, max: 10 },
  { id:11, emoji: '💧', name: 'Water Bottle',        type: 'num', min: 1, max: 10 },
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const chatArea = document.getElementById('chatArea');
const chatInput = document.getElementById('chatInput');

function scrollBottom() {
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50);
}

function addMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'bot' ? '🍗' : '😊';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function typing(callback, delay = 800) {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = '🍗';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  scrollBottom();
  setTimeout(() => {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
    callback();
  }, delay);
}

// ─── MENU DISPLAY ─────────────────────────────────────────────────────────────
function showMenu() {
  const bubble = addMsg('bot',
    `🎉 <b>Assalamu Alaikum!</b> Sabri Chicken Fry Corner mein aapka swagat hai!<br><br>
     Neeche hamare menu se apni pasand ka item select karein 👇`
  );
  // Append menu grid
  const grid = document.createElement('div');
  grid.className = 'menu-grid';
  grid.style.marginTop = '10px';
  menuItems.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'menu-item-btn';
    btn.dataset.id = item.id;
    btn.innerHTML = `
      <span class="item-emoji">${item.emoji}</span>
      <span class="item-name">${item.name}</span>
      <span class="item-qty">${item.type === 'qty' ? item.options.join(' / ') : '1–10 pieces'}</span>`;
    btn.onclick = () => selectMenuItem(item);
    grid.appendChild(btn);
  });
  bubble.appendChild(grid);
  scrollBottom();
}

// ─── SELECT ITEM ──────────────────────────────────────────────────────────────
function selectMenuItem(item) {
  state.currentItem = item;
  state.step = 'qty_select';

  addMsg('user', `${item.emoji} ${item.name} select kiya`);

  typing(() => {
    if (item.type === 'qty') {
      showQtyPanel(item);
    } else {
      showNumPanel(item);
    }
  }, 500);
}

function showQtyPanel(item) {
  const bubble = addMsg('bot', `<b>${item.emoji} ${item.name}</b> — Quantity select karein:`);
  const panel = document.createElement('div');
  panel.className = 'qty-panel';
  panel.innerHTML = `<h4>📦 Size chunein</h4>`;

  const qtyRow = document.createElement('div');
  qtyRow.className = 'qty-row';
  let selectedQty = null;

  item.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qty-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      qtyRow.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQty = opt;
    };
    qtyRow.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '✅ Cart Mein Add Karein';
  addBtn.onclick = () => {
    if (!selectedQty) { alert('Pehle size chunein!'); return; }
    addToCart(item, selectedQty, 1);
    panel.remove();
  };

  panel.appendChild(qtyRow);
  panel.appendChild(addBtn);
  bubble.appendChild(panel);
  scrollBottom();
}

function showNumPanel(item) {
  const bubble = addMsg('bot', `<b>${item.emoji} ${item.name}</b> — Kitne chahiye?`);
  const panel = document.createElement('div');
  panel.className = 'qty-panel';
  panel.innerHTML = `<h4>🔢 Quantity chunein (1–10)</h4>`;

  let count = 1;
  const numRow = document.createElement('div');
  numRow.className = 'num-row';

  const minusBtn = document.createElement('button');
  minusBtn.className = 'num-btn';
  minusBtn.textContent = '−';

  const display = document.createElement('div');
  display.className = 'num-display';
  display.textContent = count;

  const plusBtn = document.createElement('button');
  plusBtn.className = 'num-btn';
  plusBtn.textContent = '+';

  minusBtn.onclick = () => { if (count > 1) { count--; display.textContent = count; } };
  plusBtn.onclick = () => { if (count < 10) { count++; display.textContent = count; } };

  numRow.appendChild(minusBtn);
  numRow.appendChild(display);
  numRow.appendChild(plusBtn);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '✅ Cart Mein Add Karein';
  addBtn.onclick = () => {
    addToCart(item, null, count);
    panel.remove();
  };

  panel.appendChild(numRow);
  panel.appendChild(addBtn);
  bubble.appendChild(panel);
  scrollBottom();
}

// ─── CART ─────────────────────────────────────────────────────────────────────
function addToCart(item, size, count) {
  const existing = state.cart.find(c =>
    c.id === item.id && c.size === size
  );
  if (existing) {
    existing.count += count;
  } else {
    state.cart.push({ id: item.id, emoji: item.emoji, name: item.name, size, count });
  }

  const label = size ? `${item.name} (${size})` : `${item.name} x${count}`;
  addMsg('bot',
    `✅ <b>${item.emoji} ${label}</b> cart mein add ho gaya!<br><br>
     <div style="font-size:0.78rem;color:#ccc;">Aur items add karein ya order confirm karein 👇</div>`
  );

  // Buttons
  const wrap = chatArea.lastChild.querySelector('.bubble');
  const optRow = document.createElement('div');
  optRow.className = 'option-btns';

  const moreBtn = document.createElement('button');
  moreBtn.className = 'opt-btn';
  moreBtn.textContent = '➕ Aur Order Karein';
  moreBtn.onclick = () => { optRow.remove(); showMenu(); };

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'opt-btn';
  confirmBtn.style.background = 'rgba(245,166,35,0.3)';
  confirmBtn.textContent = '🛒 Order Confirm Karein';
  confirmBtn.onclick = () => { optRow.remove(); askForInfo(); };

  optRow.appendChild(moreBtn);
  optRow.appendChild(confirmBtn);
  wrap.appendChild(optRow);
  scrollBottom();
}

// ─── INFO COLLECTION ──────────────────────────────────────────────────────────
function askForInfo() {
  state.step = 'collecting_info';
  state.pendingInfo = 'both';
  typing(() => {
    addMsg('bot',
      `📋 Apna <b>Table Number</b> aur <b>Naam</b> batayein please!<br>
       <span style="font-size:0.75rem;color:#aaa;">Example: <i>3 Abdullah</i></span>`
    );
    chatInput.placeholder = 'Table No. aur Naam likhein...';
    chatInput.focus();
  }, 600);
}

// ─── ORDER SUMMARY ────────────────────────────────────────────────────────────
function showOrderSummary() {
  const bubble = addMsg('bot',
    `🧾 <b>Aapka Order Summary</b><br>
     Table: <b>${state.tableNo}</b> &nbsp;|&nbsp; Naam: <b>${state.customerName}</b>`
  );

  const summary = document.createElement('div');
  summary.className = 'order-summary';
  summary.innerHTML = `<h4>🛒 Cart Items</h4>`;

  state.cart.forEach(item => {
    const row = document.createElement('div');
    row.className = 'order-item-row';
    const label = item.size ? `${item.emoji} ${item.name} (${item.size})` : `${item.emoji} ${item.name}`;
    row.innerHTML = `<span>${label}</span><span>x${item.count}</span>`;
    summary.appendChild(row);
  });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'confirm-btn';
  confirmBtn.textContent = '✅ Order Confirm Karein';
  confirmBtn.onclick = () => {
    summary.remove();
    placeOrder();
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = '✏️ Order Badlein';
  cancelBtn.onclick = () => {
    summary.remove();
    state.cart = [];
    addMsg('bot', '🔄 Order clear ho gayi. Naya order karein!');
    setTimeout(showMenu, 400);
  };

  summary.appendChild(confirmBtn);
  summary.appendChild(cancelBtn);
  bubble.appendChild(summary);
  scrollBottom();
}

// ─── TELEGRAM CONFIG ──────────────────────────────────────────────────────────
// ⬇️ YAHAN APNA BOT TOKEN AUR CHAT ID DAALEIN ⬇️
const TELEGRAM_BOT_TOKEN = 'YAHAN_APNA_BOT_TOKEN_DAALEIN';   // e.g. 7123456789:AAFxxxxxxxxxxxxxxxxxxxxxx
const TELEGRAM_CHAT_ID   = 'YAHAN_APNA_CHAT_ID_DAALEIN';     // e.g. 987654321

async function sendTelegramNotification() {
  try {
    // Order items ki list banao
    const itemLines = state.cart.map(item => {
      const size = item.size ? ` (${item.size})` : '';
      return `  • ${item.emoji} ${item.name}${size} × ${item.count}`;
    }).join('\n');

    const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

    const message =
`🔔 *NAYA ORDER AAYA!* 🔔
━━━━━━━━━━━━━━━━━━
🪑 *Table No:* ${state.tableNo}
👤 *Customer:* ${state.customerName}
🕐 *Time:* ${now}
━━━━━━━━━━━━━━━━━━
🛒 *Order Details:*
${itemLines}
━━━━━━━━━━━━━━━━━━
📍 Sabri Chicken Fry Corner`;

    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: message,
        parse_mode: 'Markdown'
      })
    });
  } catch (err) {
    console.error('Telegram notification error:', err);
  }
}

// ─── PLACE ORDER ──────────────────────────────────────────────────────────────
function placeOrder() {
  state.step = 'done';

  // ✅ Telegram pe notification bhejo jab customer confirm kare
  sendTelegramNotification();

  typing(() => {
    addMsg('bot',
      `🎊 <b>Order de diya gaya!</b><br><br>
       Shukriya <b>${state.customerName}</b> ji!<br>
       Table No. <b>${state.tableNo}</b> par aapka order <b>10-15 minutes</b> mein aa jayega! 🍗🔥<br><br>
       <span style="font-size:0.78rem;color:#aaa;">Hamara khana khane ka shukriya!</span>`
    );

    setTimeout(() => {
      typing(() => {
        const b = addMsg('bot', `Kya aap kuch aur order karna chahenge? 😊`);
        const btn = document.createElement('button');
        btn.className = 'more-order-btn';
        btn.textContent = '🔁 Naya Order Karein';
        btn.onclick = () => {
          state.cart = [];
          state.step = 'menu';
          state.customerName = '';
          state.tableNo = '';
          btn.remove();
          showMenu();
          chatInput.placeholder = 'Kuch likhein ya menu se order karein...';
        };
        b.appendChild(btn);
        scrollBottom();
      }, 1000);
    }, 1000);
  }, 800);
}

// ─── USER INPUT HANDLER ───────────────────────────────────────────────────────
function handleUserInput() {
  const val = chatInput.value.trim();
  if (!val) return;
  chatInput.value = '';

  if (state.step === 'collecting_info') {
    addMsg('user', val);
    const parts = val.split(' ');
    const tableNo = parts[0];
    const name = parts.slice(1).join(' ') || 'Guest';
    state.tableNo = tableNo;
    state.customerName = name;
    state.step = 'confirm';
    chatInput.placeholder = 'Kuch likhein ya menu se order karein...';
    typing(() => showOrderSummary(), 600);
    return;
  }

  // Generic fallback
  addMsg('user', val);
  typing(() => {
    addMsg('bot',
      `Menu se item select karein ya agar koi sawal hai to humse puchein! 😊`
    );
  }, 500);
}

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleUserInput();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  setTimeout(() => showMenu(), 400);
};
</script>
